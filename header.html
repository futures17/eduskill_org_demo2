<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSkill - Premium Silk Effect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #271e77;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
    <!-- Three.js UMD Build -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <script>
        // Configuration Props
        const CONFIG = {
            speed: 5,
            scale: 1,
            color: '#0D1B4A',
            noiseIntensity: 1.5,
            rotation: 0
        };

        const vertexShader = `
            varying vec2 vUv;
            varying vec3 vPosition;

            void main() {
                vPosition = position;
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            varying vec2 vUv;
            varying vec3 vPosition;

            uniform float uTime;
            uniform vec3  uColor;
            uniform float uSpeed;
            uniform float uScale;
            uniform float uRotation;
            uniform float uNoiseIntensity;
            uniform vec2  uResolution;

            const float e = 2.71828182845904523536;

            float noise(vec2 texCoord) {
                float G = e;
                vec2  r = (G * sin(G * texCoord));
                return fract(r.x * r.y * (1.0 + texCoord.x));
            }

            vec2 rotateUvs(vec2 uv, float angle) {
                float c = cos(angle);
                float s = sin(angle);
                mat2  rot = mat2(c, -s, s, c);
                return rot * uv;
            }

            void main() {
                float rnd        = noise(gl_FragCoord.xy);
                vec2  uv         = rotateUvs(vUv * uScale, uRotation);
                vec2  tex        = uv * uScale;
                float tOffset    = uSpeed * uTime;

                tex.y += 0.03 * sin(8.0 * tex.x - tOffset);

                float pattern = 0.6 +
                                0.4 * sin(5.0 * (tex.x + tex.y +
                                                 cos(3.0 * tex.x + 5.0 * tex.y) +
                                                 0.02 * tOffset) +
                                         sin(20.0 * (tex.x + tex.y - 0.1 * tOffset)));

                vec4 col = vec4(uColor, 1.0) * vec4(pattern) - rnd / 15.0 * uNoiseIntensity;
                col.a = 1.0;
                gl_FragColor = col;
            }
        `;

        // Utility: Convert Hex string to normalized RGB array
        function hexToNormalizedRGB(hex) {
            hex = hex.replace('#', '');
            return [
                parseInt(hex.slice(0, 2), 16) / 255,
                parseInt(hex.slice(2, 4), 16) / 255,
                parseInt(hex.slice(4, 6), 16) / 255
            ];
        }

        // Initialize WebGL Scene
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        // Map configs to uniform specifications
        const rgbColor = hexToNormalizedRGB(CONFIG.color);
        const uniforms = {
            uSpeed: { value: CONFIG.speed },
            uScale: { value: CONFIG.scale },
            uNoiseIntensity: { value: CONFIG.noiseIntensity },
            uColor: { value: new THREE.Color(rgbColor[0], rgbColor[1], rgbColor[2]) },
            uRotation: { value: CONFIG.rotation },
            uTime: { value: 0 },
            uResolution: { value: new THREE.Vector2(container.clientWidth, container.clientHeight) }
        };

        // Create Fullscreen Plane Geometry and Custom Shader Material
        const geometry = new THREE.PlaneGeometry(2, 2);
        const material = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            uniforms: uniforms,
            depthWrite: false,
            depthTest: false
        });

        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        // Animation Loop Tracking Delta Time
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            uniforms.uTime.value += 0.1 * delta;
            renderer.render(scene, camera);
        }

        // Handle Window Resizing
        window.addEventListener('resize', () => {
            const width = container.clientWidth;
            const height = container.clientHeight;
            renderer.setSize(width, height);
            uniforms.uResolution.value.set(width, height);
        });

        animate();
    </script>
</body>
</html>
